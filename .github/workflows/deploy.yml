name: Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 进入后端目录
            cd ~/wenjuan-platform/backend
            
            # 2. 初始化 git（如果还没做的话）
            if [ ! -d ".git" ]; then
              git init
              git remote add origin git@github.com:Cabbage-2023/wenjuan-backend.git
            fi

            # 3. 核心技巧：先备份 .env，防止 reset --hard 把它冲掉
            # 如果你服务器上原本就有 .env，这一步能保命
            [ -f .env ] && cp .env .env.bak

            # 4. 强制同步代码
            git fetch --all
            git reset --hard origin/main

            # 5. 还原 .env
            [ -f .env.bak ] && mv .env.bak .env

            # 6. 回到根目录重启容器
            cd ~/wenjuan-platform
            docker compose up -d --build backend